<div class="admin-container">
  <div class="header-action">
    <h2 class="page-title">Manage Products</h2>
    <a routerLink="/admin-dashboard/add-product" class="btn btn-primary">Add New Product</a>
  </div>

  <div class="card table-container">
    <table class="product-table">
      <thead>
        <tr>
          <th>Image</th>
          <th>Name</th>
          <th>Category</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let product of products">
          <td>
            <img [src]="product.imageUrl || 'https://via.placeholder.com/50'" [alt]="product.name" class="table-img">
          </td>
          <td class="fw-bold">{{ product.name }}</td>
          <td><span class="badge">{{ product.category }}</span></td>
          <td class="price">${{ product.price }}</td>
          <td>{{ product.stock }}</td>
          <td class="actions">
            <a [routerLink]="['/admin-dashboard/edit-product', product._id]" class="btn btn-icon btn-edit">Edit</a>
            <button class="btn btn-icon btn-delete" (click)="deleteProduct(product._id)">Delete</button>
          </td>
        </tr>
        <tr *ngIf="products.length === 0">
          <td colspan="6" class="text-center py-4">No products found. Add some!</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
