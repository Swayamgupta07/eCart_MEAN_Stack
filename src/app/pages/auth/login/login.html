<div class="card login-card">
  <h2>Login to Your Account</h2>
    <div *ngIf="errorMessage" class="error-box">
    {{ errorMessage }}
  </div>
  <Form (ngsubmit)="onSubmit()">
    <div class="form-group">
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" [(ngModel)]="credentials.email" required placeholder="Enter your email">
    </div>
    <div class="form-group">
      <label for="password">Password:</label>
      <input type="password" id="password" name="password" [(ngModel)]="credentials.password" required placeholder="Enter your password">
    </div>
    <button type="submit">Login</button>
  </Form>
  <p class="signup-link">
    Don't have an account? <a routerLink="/register">Sign up</a>
  </p>
</div>
