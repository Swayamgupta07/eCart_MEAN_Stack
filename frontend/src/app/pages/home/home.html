<div class="home-container">
  <h1 class="page-title">Explore Our Top Products</h1>
  
  <div class="product-grid">
    <div class="card product-card" *ngFor="let product of products">
      <img [src]="product.imageUrl" [alt]="product.name" class="product-image">
      
      <div class="product-details">
        <span class="category-badge">{{ product.category }}</span>
        <h3>{{ product.name }}</h3>
        <p class="description">{{ product.description }}</p>
        
        <div class="price-action">
          <div class="prices">
            <span class="price original-price" style="text-decoration: line-through; font-size: 0.9rem; color: #888;">{{ product.price | currency:'USD' }}</span>
            <span class="price">{{ product.price | discount:15 }}</span>
          </div>
          <button (click)="addToCart(product)">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>
</div>
