<div class="form-container">
  <div class="card form-card">
    <div class="form-header">
      <h2 class="page-title">{{ isEditMode() ? 'Modify Product' : 'Add New Product' }}</h2>
      <p class="subtitle">Fill in the organic product details for the grocery catalog</p>
    </div>

    @if (productData.imageUrl && (productData.imageUrl.startsWith('http') || productData.imageUrl.startsWith('data:'))) {
      <div class="image-preview-container">
        <img [src]="productData.imageUrl" alt="Product Preview" class="image-preview">
      </div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Product Title</label>
        <input type="text" id="name" name="name" [(ngModel)]="productData.name" required placeholder="e.g. Fresh Red Strawberries">
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <input type="text" id="category" name="category" [(ngModel)]="productData.category" required placeholder="e.g. Fruits, Vegetables, Dairy">
      </div>

      <div class="form-group">
        <label for="description">Product Description</label>
        <textarea id="description" name="description" [(ngModel)]="productData.description" rows="4" placeholder="Briefly describe the product origins, packaging, weight, etc..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group flex-1">
          <label for="price">Price (₹)</label>
          <input type="number" id="price" name="price" [(ngModel)]="productData.price" required min="0" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group flex-1">
          <label for="stock">Inventory Stock</label>
          <input type="number" id="stock" name="stock" [(ngModel)]="productData.stock" required min="0" placeholder="0">
        </div>
      </div>

      <div class="form-group">
        <label for="imageUrl">Image URL</label>
        <input type="url" id="imageUrl" name="imageUrl" [(ngModel)]="productData.imageUrl" placeholder="https://example.com/product.jpg">
      </div>

      <div class="action-buttons">
        <a routerLink="/admin-dashboard" class="btn btn-cancel">Cancel</a>
        <button type="submit" class="btn btn-save">
          {{ isEditMode() ? 'Update Product' : 'Create Product' }}
        </button>
      </div>
    </form>
  </div>
</div>
