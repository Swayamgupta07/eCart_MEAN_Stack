<div class="auth-container">
  <div class="card auth-card">
    <div class="auth-header">
      <h2>Create Account</h2>
      <p>Join eCart to order fresh, organic grocery items today!</p>
    </div>

    @if (errorMessage()) {
      <div class="error-box">
        <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span>{{ errorMessage() }}</span>
      </div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Full Name</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <input type="text" id="name" name="name" [(ngModel)]="userData.name" required placeholder="Enter your full name">
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
          <input type="email" id="email" name="email" [(ngModel)]="userData.email" required placeholder="name@example.com">
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input type="password" id="password" name="password" [(ngModel)]="userData.password" required placeholder="Choose a strong password">
        </div>
      </div>

      <div class="form-group">
        <label>Select Your Account Type</label>
        <div class="role-selector">
          <label class="role-pill" [class.selected]="userData.role === 'customer'">
            <input type="radio" name="role" value="customer" [(ngModel)]="userData.role">
            <span>Customer</span>
          </label>
          <label class="role-pill" [class.selected]="userData.role === 'admin'">
            <input type="radio" name="role" value="admin" [(ngModel)]="userData.role">
            <span>Store Admin</span>
          </label>
        </div>
      </div>

      <button type="submit" class="submit-btn">
        Register Now
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a routerLink="/login" class="link-btn">Sign In</a>
    </div>
  </div>
</div>
