services:
  mongodb:
    image: mongo:latest
    container_name: ecart-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - ecart-network

  backend:
    build: ./backend
    container_name: ecart-backend
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/eCart
      - JWT_SECRET=SecureJWTSecretKey
      - PORT=3000
    depends_on:
      - mongodb
    networks:
      - ecart-network

  frontend:
    build: ./frontend
    container_name: ecart-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ecart-network

volumes:
  mongo-data:

networks:
  ecart-network:
    driver: bridge
